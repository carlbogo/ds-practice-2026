syntax = "proto3";

package transaction_verification;

service TransactionVerificationService {
    rpc InitOrder(InitOrderRequest) returns (InitOrderResponse);
    rpc CheckItems(TransactionEventRequest) returns (TransactionEventResponse);
    rpc CheckUserAndBillingData(TransactionEventRequest) returns (TransactionEventResponse);
    rpc CheckPaymentData(TransactionEventRequest) returns (TransactionEventResponse);
    rpc FinalizeOrder(FinalizeOrderRequest) returns (FinalizeOrderResponse);
    rpc StartWorkflow(StartWorkflowRequest) returns (WorkflowResponse);
}

message Item {
    string name = 1;
    int32 quantity = 2;
}

message InitOrderRequest {
    string order_id = 1;
    string purchaser_name = 2;
    string purchaser_email = 3;
    string credit_card_number = 4;
    string credit_card_expiration = 5;
    string credit_card_cvv = 6;
    string billing_street = 7;
    string billing_city = 8;
    string billing_state = 9;
    string billing_zip = 10;
    string billing_country = 11;
    repeated Item items = 12;
}

message InitOrderResponse {
    bool ok = 1;
    repeated int32 vc = 2;
}

message TransactionEventRequest {
    string order_id = 1;
    repeated int32 vc = 2;
}

message TransactionEventResponse {
    bool is_valid = 1;
    repeated string reasons = 2;
    repeated int32 vc = 3;
}

message FinalizeOrderRequest {
    string order_id = 1;
    repeated int32 vc = 2;
}

message FinalizeOrderResponse {
    bool ok = 1;
}

message StartWorkflowRequest {
    string order_id = 1;
    repeated int32 vc = 2;
    repeated string purchased_books = 3;
    string suggestion_mode = 4;
}

message WorkflowResponse {
    bool ok = 1;
    repeated string reasons = 2;
    repeated string suggested_books = 3;
    repeated int32 vc = 4;
}
