syntax = "proto3";

service BooksDatabase {
  rpc Read (ReadRequest) returns (ReadResponse);
  rpc Write (WriteRequest) returns (WriteResponse);
  rpc DecrementStock (DecrementRequest) returns (WriteResponse);
  rpc IncrementStock (IncrementRequest) returns (WriteResponse);
  rpc ListAvailableBooks (Empty) returns (AvailableBooksResponse);
  rpc Prepare (BooksPrepareRequest) returns (BooksPrepareResponse);
  rpc Commit (BooksCommitRequest) returns (BooksCommitResponse);
  rpc Abort (BooksAbortRequest) returns (BooksAbortResponse);
}

message Empty {}

message AvailableBooksResponse {
  repeated string books = 1;
}

message ReadRequest {
  string title = 1;
}

message ReadResponse {
  int32 stock = 1;
}

message WriteRequest {
  string title = 1;
  int32 new_stock = 2;
}

message DecrementRequest {
  string title = 1;
  int32 quantity = 2;
}

message IncrementRequest {
  string title = 1;
  int32 quantity = 2;
}

message WriteResponse {
  bool success = 1;
}

message BookItem {
  string title = 1;
  int32 quantity = 2;
}

message BooksPrepareRequest {
  string order_id = 1;
  repeated BookItem items = 2;
}

message BooksPrepareResponse {
  bool vote = 1;
  string reason = 2;
}

message BooksCommitRequest {
  string order_id = 1;
}

message BooksCommitResponse {
  bool success = 1;
}

message BooksAbortRequest {
  string order_id = 1;
}

message BooksAbortResponse {
  bool success = 1;
}
