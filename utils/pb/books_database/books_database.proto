syntax = "proto3";

service BooksDatabase {
  rpc Read (ReadRequest) returns (ReadResponse);
  rpc Write (WriteRequest) returns (WriteResponse);
  rpc DecrementStock (DecrementRequest) returns (WriteResponse);
  rpc ListAvailableBooks (Empty) returns (AvailableBooksResponse);

}


message Empty {}

message AvailableBooksResponse {
  repeated string books = 1;
}

message ReadRequest {
  string title = 1;
}

message ReadResponse {
  int32 stock = 1;
}

message WriteRequest {
  string title = 1;
  int32 new_stock = 2;
}

message DecrementRequest {
  string title = 1;
  int32 quantity = 2;
}

message WriteResponse {
  bool success = 1;
}